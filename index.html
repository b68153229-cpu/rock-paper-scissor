<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="choices">
        <button onclick="rpsGame('rock')">Rock</button>
        <button onclick="rpsGame('paper')">Paper</button>
        <button onclick="rpsGame('scissor')">Scissor</button>
    </div>

    <div id="player">PLAYER: </div>
    <div id="computer">COMPUTER: </div>
    <div id="result"></div>

    <div class="score">Player Score: 
        <span id="playerScore">0</span>
    </div>

    <div class="score">Computer Score: 
        <span id="computerScore">0</span>
    </div>

    <script src="index.js"></script>
    
</body>
</html>
